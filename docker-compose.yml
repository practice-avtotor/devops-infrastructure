version: '3.8'

services:
  # ============================================
  # Redis — брокер сообщений для Celery
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: bom-redis
    ports:
      - "6379:6379"
    networks:
      - bom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # API Backend (FastAPI + Uvicorn)
  # ============================================
  backend:
    build:
      context: ../burlak-backend
      dockerfile: Dockerfile
    container_name: bom-backend
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      SQLITE_DB_PATH: /app/data/tasks.db
      STORAGE_PATH: /app/storage
    volumes:
      - shared_storage:/app/storage
      - sqlite_data:/app/data
      - ../burlak-backend:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bom-network
    restart: unless-stopped

  # ============================================
  # Celery Worker — бизнес-логика (парсинг, сверка)
  # ============================================
#  celery-worker:
#    build:
#     context: ../burlak-backend
#      dockerfile: Dockerfile
#    container_name: bom-celery-worker
#    command: celery -A app.tasks worker --loglevel=info --concurrency=4
#    environment:
#      REDIS_URL: redis://redis:6379/0
#      SQLITE_DB_PATH: /app/data/tasks.db
#      STORAGE_PATH: /app/storage
#    volumes:
#      - shared_storage:/app/storage
#      - sqlite_data:/app/data
#      - ../burlak-backend:/app
#    depends_on:
#      redis:
#        condition: service_healthy
#    networks:
#      - bom-network
#    restart: unless-stopped

  # ============================================
  # Frontend (Vue 3 + Vite)
  # ============================================
  frontend:
    build:
      context: ../Burlak_frontend/Burlak_front
      dockerfile: Dockerfile
    container_name: bom-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - bom-network
    restart: unless-stopped

# ============================================
# Сети и тома
# ============================================
networks:
  bom-network:
    driver: bridge

volumes:
  shared_storage:
  sqlite_data:
