services:
  # ============================================
  # Redis — брокер сообщений для Celery
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: bom-redis
    networks:
      - bom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # API Backend (FastAPI + Uvicorn)
  # ============================================
  backend:
    build:
      context: ../burlak-backend
      dockerfile: Dockerfile
    container_name: bom-backend
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_URL: /data/jobs.db
      STORAGE_PATH: /data
      ML_API_URL: http://ml-mock:5000
    volumes:
      - bom_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bom-network
    restart: unless-stopped

  # ============================================
  # Celery Worker — бизнес-логика (парсинг, сверка)
  # ============================================
  celery-worker:
    build:
      context: ../burlak-backend
      dockerfile: Dockerfile
    container_name: bom-celery-worker
    command: /app/.venv/bin/python -m celery -A app.worker.celery_app worker --loglevel=info --concurrency=4
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_URL: /data/jobs.db
      STORAGE_PATH: /data
      ML_API_URL: http://ml-mock:5000
    volumes:
      - bom_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bom-network
    restart: unless-stopped

  # ============================================
  # ML Mock — эмуляция AI-сервиса для локальной разработки
  # ============================================
  ml-mock:
    build:
      context: ./ml-mock
      dockerfile: Dockerfile
    container_name: bom-ml-mock
    ports:
      - "5000:5000"
    networks:
      - bom-network
    restart: unless-stopped

  # ============================================
  # Frontend (Vue 3 + Vite)
  # ============================================
  frontend:
    build:
      context: ../Burlak_frontend
      dockerfile: Dockerfile
    container_name: bom-frontend
    depends_on:
      - backend
    networks:
      - bom-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: bom-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - bom-network
    restart: unless-stopped

# ============================================
# Сети и тома
# ============================================
networks:
  bom-network:
    driver: bridge

volumes:
  bom_data:
