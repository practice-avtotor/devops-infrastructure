name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # JOB 1: Линтинг и статический анализ
  # ============================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: practice-avtotor/burlak-backend
          path: burlak-backend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies with dev packages
        run: |
          cd burlak-backend
          uv sync

      - name: Run ruff (linter)
        run: |
          cd burlak-backend
          uv run ruff check .

      - name: Run mypy (type checking)
        run: |
          cd burlak-backend
          uv run mypy .

  # ============================================
  # JOB 2: Модульные и интеграционные тесты
  # ============================================
  tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        test_type: [parser, integration, e2e]
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: practice-avtotor/burlak-backend
          path: burlak-backend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies with dev packages
        run: |
          cd burlak-backend
          uv sync

      - name: Run ${{ matrix.test_type }} tests
        run: |
          cd burlak-backend
          uv run pytest tests/${{ matrix.test_type }}/ -v --cov=burlak_parser --cov-report=term

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.test_type }}
          path: burlak-backend/htmlcov/

  # ============================================
  # JOB 3: Специфические тесты
  # ============================================
  specific-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: practice-avtotor/burlak-backend
          path: burlak-backend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          cd burlak-backend
          uv sync

      - name: Run test_baic_xlsx_integrity.py
        run: |
          cd burlak-backend
          uv run pytest tests/test_baic_xlsx_integrity.py -v

  # ============================================
  # JOB 4: ПРОВЕРКА СБОРКИ DOCKER (без пуша!)
  # ============================================
  docker-build-test:
    runs-on: ubuntu-latest
    needs: [tests, specific-tests]
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: practice-avtotor/burlak-backend
          path: burlak-backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: practice-avtotor/Burlak_frontend
          path: Burlak_frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (test only)
        run: docker build -t backend-test ./burlak-backend

      - name: Build frontend image (test only)
        run: docker build -t frontend-test ./Burlak_frontend/Burlak_front

      - name: Test backend container starts
        run: |
          docker run -d --name test-backend -p 8000:8000 backend-test
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-backend && exit 1)
          docker stop test-backend
