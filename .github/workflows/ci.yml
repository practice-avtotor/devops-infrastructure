name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # JOB 1: Проверка кода бэкенда
  # ============================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v7
        with:
          repository: practice-avtotor/burlak-backend
          path: burlak-backend

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd burlak-backend
          uv sync

      - name: Run linter (Ruff)
        run: |
          cd burlak-backend
          uv run ruff check .

      - name: Check formatting (Ruff)
        run: |
          cd burlak-backend
          uv run ruff format . --check

      - name: Run type checker (Mypy)
        run: |
          cd burlak-backend
          uv run mypy .

      - name: Run tests (Pytest)
        run: |
          cd burlak-backend
          uv run pytest

  # ============================================
  # JOB 2: Проверка фронтенда (линтеры, сборка)
  # ============================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v7
        with:
          repository: practice-avtotor/Burlak_frontend
          path: Burlak_frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Burlak_frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd Burlak_frontend
          npm ci

      - name: Run lint
        run: |
          cd Burlak_frontend
          npm run lint || echo "No lint script found"

      - name: Build project
        run: |
          cd Burlak_frontend
          npm run build

